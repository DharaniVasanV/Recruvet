spring.application.name=fakejobpostsystem
server.port=${PORT:8081}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.servlet.multipart.max-file-size=16MB
spring.servlet.multipart.max-request-size=16MB

spring.thymeleaf.cache=false

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.python-command=${APP_PYTHON_COMMAND:python}
app.tesseract-command=${APP_TESSERACT_COMMAND:tesseract}
app.gemini-models=gemini-2.5-flash,gemini-2.5-flash-lite,gemini-1.5-flash
app.public-base-url=${APP_PUBLIC_BASE_URL:}

whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:}

whoisxml.api-key=${WHOISXML_API_KEY:}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
tpo.digest.enabled=${TPO_DIGEST_ENABLED:false}
tpo.digest.from=${TPO_DIGEST_FROM:${SMTP_USERNAME:}}
tpo.digest.cron=${TPO_DIGEST_CRON:0 0 9 ? * MON}
