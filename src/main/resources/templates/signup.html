<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fake Job Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="fas fa-shield-alt me-2"></i>Job Fraud Detector
        </a>
    </div>
</nav>

<main class="container-fluid py-4">
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Sign Up</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/signup}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="accountType" class="form-label">Account Type</label>
                            <select class="form-select" id="accountType" name="accountType">
                                <option value="USER">Student / Individual</option>
                                <option value="TPO">College Placement Cell / TPO</option>
                            </select>
                        </div>
                        <div class="mb-3" id="institutionGroup">
                            <label for="institutionId" class="form-label">Verified Institution</label>
                            <select class="form-select" id="institutionId" name="institutionId">
                                <option value="">Select institution</option>
                                <option th:each="institution : ${institutions}"
                                        th:value="${institution.id}"
                                        th:text="${institution.name + ' (@' + institution.verifiedEmailDomain + ')'}">
                                    Institution
                                </option>
                            </select>
                            <div class="form-text" id="institutionHelp">Optional for students. Required for TPO accounts.</div>
                        </div>
                        <div class="mb-3 form-check" id="shareGroup">
                            <input class="form-check-input" type="checkbox" id="shareWithInstitution" name="shareWithInstitution" value="true">
                            <label class="form-check-label" for="shareWithInstitution">
                                Share my future analyses with my college placement cell
                            </label>
                            <div class="form-text">Your TPO can see your shared scans only when this is enabled.</div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mb-3">
                            <i class="fas fa-user-plus me-2"></i>Create Account
                        </button>
                    </form>

                    <div class="text-center mb-3">
                        <span class="text-muted">or</span>
                    </div>

                    <a th:href="@{/google-login}" class="btn btn-danger w-100 mb-3">
                        <i class="fab fa-google me-2"></i>Sign up with Google
                    </a>

                    <div class="text-center">
                        <p class="mb-0">Already have an account? <a th:href="@{/login}">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const accountType = document.getElementById('accountType');
const institutionGroup = document.getElementById('institutionGroup');
const institutionHelp = document.getElementById('institutionHelp');
const shareGroup = document.getElementById('shareGroup');
function toggleInstitution() {
    institutionGroup.style.display = 'block';
    shareGroup.style.display = accountType.value === 'TPO' ? 'none' : 'block';
    institutionHelp.textContent = accountType.value === 'TPO'
        ? 'Your email must match the institution domain.'
        : 'Optional: select your college if you want TPO-visible sharing.';
}
accountType.addEventListener('change', toggleInstitution);
toggleInstitution();
</script>
</body>
</html>
